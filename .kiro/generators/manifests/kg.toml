[agents.project-resources]
template = true

[agents.project-resources.resources.rust]
locations = [
  "docs/src/SUMMARY.md",
  "docs/src/config/*.md",
  "docs/kiro/configuration-reference.md"
]

[agents.project-resources.knowledge.kiro]
source = "file://./docs/kiro"
description = "Kiro CLI configuration reference for JSON agents"
autoUpdate = false
indexType = "best"

[agents.project-resources.knowledge.facet]
source = "file://./docs/facet"
description = "facet is a serde replacement"
autoUpdate = false
indexType = "best"
